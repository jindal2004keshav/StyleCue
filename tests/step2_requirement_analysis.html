<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 2 — Requirement Analysis</title>
  <script src="test_utils.js"></script>
  <style id="shared"></style>
</head>
<body>
  <h1>Step 2 — Requirement Analysis</h1>
  <p class="subtitle">POST /api/steps/analyse-requirements · Intelligent LLM → reasoning + Qdrant queries</p>

  <label for="department">Department</label>
  <select id="department" style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;margin-bottom:16px">
    <option value="women">Women</option>
    <option value="men">Men</option>
  </select>

  <label for="prompt">Prompt</label>
  <input type="text" id="prompt" value="I need an outfit for a summer garden party" />

  <label for="preferences">Preferences (JSON)</label>
  <textarea id="preferences" rows="4">{
  "Occasion": "Outdoor",
  "Fit": "Relaxed",
  "Material": "Cotton"
}</textarea>

  <label for="image_metas">Image metas from Step 1 (JSON array, optional)</label>
  <textarea id="image_metas" rows="6">[]</textarea>

  <label for="llm_provider">LLM Provider</label>
  <select id="llm_provider" style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;margin-bottom:16px">
    <option value="">Default (Gemini)</option>
    <option value="anthropic">Anthropic</option>
  </select>

  <button id="submit-btn" onclick="run()">Submit</button>
  <div id="result"><div class="label"></div><pre></pre></div>

  <script>
    document.getElementById("shared").textContent = SHARED_STYLES;

    async function run() {
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Analysing…";

      try {
        let preferences = {}, image_metas = [];
        try { preferences = JSON.parse(document.getElementById("preferences").value); }
        catch { throw new Error("Preferences is not valid JSON"); }
        try { image_metas = JSON.parse(document.getElementById("image_metas").value); }
        catch { throw new Error("Image metas is not valid JSON"); }

        const result = await apiPost("/steps/analyse-requirements", {
          department: document.getElementById("department").value,
          prompt: document.getElementById("prompt").value,
          preferences,
          image_metas,
          llm_provider: document.getElementById("llm_provider").value || undefined,
        });
        showResult(result);
      } catch (err) {
        showError(err);
      } finally {
        btn.disabled = false;
        btn.textContent = "Submit";
      }
    }
  </script>
</body>
</html>
